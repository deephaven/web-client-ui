# This workflow publishes packages to npm using trusted publishing
# It triggers on release creation to publish production packages
# It can also be manually triggered to publish alpha/canary packages
name: Publish Packages
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      preid:
        description: 'Preid used to publish package. Must be unique per branch.'
        required: true
        default: 'alpha'
      ref:
        description: 'Commit to deploy from. Defaults to branch used for workflow_dispatch action.'
        required: false
        default: ''
jobs:
  publish-packages:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Build production
        run: npm run build
      - name: Publish canary packages
        # lerna's `--canary` only differentiates runs via `+<sha>` build metadata,
        # which npm strips on publish, so every canary run for the same base
        # version collides on the same published version
        # (e.g. 1.22.2-alpha-pivot-builder.0). Instead, set an explicit,
        # npm-visible prerelease version (run_number keeps it unique per run) and
        # publish what's on disk with `from-package`.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          BASE=$(node -p "require('./lerna.json').version")
          NEXT=$(node -p "require('semver').inc('$BASE', 'patch')")
          VERSION="${NEXT}-${{ github.event.inputs.preid }}.${{ github.run_number }}"
          echo "Publishing canary version $VERSION"
          ./node_modules/.bin/lerna version "$VERSION" \
            --exact \
            --force-publish=\* \
            --no-push \
            --no-git-tag-version \
            --no-changelog \
            --yes
          ./node_modules/.bin/lerna publish from-package --dist-tag canary --yes
      - name: Publish production packages
        if: ${{ github.event_name == 'release' }}
        run: ./node_modules/.bin/lerna publish from-package --yes
      - name: Update deephaven-core
        if: ${{ github.event_name == 'release' }}
        run: |
          curl -L \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.DEEPHAVENINTERNAL_PUBLIC_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/deephaven/deephaven-core/actions/workflows/update-web.yml/dispatches --data '{"ref": "main"}'
